# =============================================================================
#  Balchug Racing — nginx (source build with nginx-http-flv-module)
#  RTMP ingest (LiveU Solo)  ->  HTTP-FLV (low latency) + HLS (fallback)
#  Deployed to: /etc/nginx/nginx.conf
# =============================================================================

user  www-data;
# ВАЖНО: ровно 1 воркер. nginx-http-flv-module хранит RTMP-поток в памяти воркера;
# при нескольких воркерах HTTP-FLV запросы балансируются и попадают на воркер без
# потока → зависают. Для одной трансляции 1 воркер оптимален. (HLS это не касается.)
worker_processes  1;
pid /run/nginx.pid;

events {
    worker_connections  4096;
}

# -----------------------------------------------------------------------------
#  RTMP — приём потока с LiveU Solo
# -----------------------------------------------------------------------------
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        # ping/timeout: быстрее освобождаем «зависшие» публикации
        ping 30s;
        ping_timeout 15s;

        # === Приём от LiveU + транскодинг в три версии (ABR) ===
        application live {
            live on;
            gop_cache on;                 # мгновенный старт HTTP-FLV источника

            # Публикация защищена секретным stream key (см. CREDENTIALS.md).
            allow publish all;
            allow play all;

            # === Запись стрима (макс. качество — копия источника 1080p60) ===
            # Каждая публикация → FLV в /var/rec (при реконнектах LiveU — много кусков).
            # Куски одной трансляции склеивает фоновый session_merger.py (systemd
            # balchug-merger): один MP4 → S3 → аннотация → каталог /archive/.
            record all;
            record_path /var/rec;
            record_unique on;
            record_suffix _%Y-%m-%d_%H-%M-%S.flv;

            # ffmpeg тянет входящий поток и пушит 3 версии в app "show":
            #   _src  — 1080p60 видео БЕЗ перекодирования (copy, макс. качество)
            #   _720  — 720p30  ~2.8 Мбит
            #   _480  — 480p30  ~1.2 Мбит
            # Аудио ПЕРЕЭНКОДИМ в AAC-LC 44100 Гц (а не copy): HLS-муксер nginx-rtmp
            # неверно расставляет таймстемпы для 48 кГц при копировании → звук играет
            # ниже тоном («монстр»). 44.1 кГц муксится корректно. CPU-стоимость ничтожна,
            # на видео/латентность/ABR не влияет. Запускается при старте публикации.
            exec ffmpeg -i rtmp://127.0.0.1:1935/live/$name
                -map 0 -c:v copy -c:a aac -ar 44100 -ac 2 -b:a 160k
                    -f flv rtmp://127.0.0.1:1935/show/${name}_src
                -map 0 -c:v libx264 -preset veryfast -tune zerolatency -profile:v main
                    -g 60 -keyint_min 60 -sc_threshold 0 -vf scale=1280:720 -r 30
                    -b:v 2800k -maxrate 3000k -bufsize 6000k
                    -c:a aac -ar 44100 -ac 2 -b:a 128k
                    -f flv rtmp://127.0.0.1:1935/show/${name}_720
                -map 0 -c:v libx264 -preset veryfast -tune zerolatency -profile:v baseline
                    -g 60 -keyint_min 60 -sc_threshold 0 -vf scale=854:480 -r 30
                    -b:v 1200k -maxrate 1400k -bufsize 2800k
                    -c:a aac -ar 44100 -ac 2 -b:a 96k
                    -f flv rtmp://127.0.0.1:1935/show/${name}_480
                2>>/var/log/nginx/ffmpeg-$name.log;
            # SIGKILL, а не TERM: при обрыве LiveU ffmpeg часто зависает на чтении
            # мёртвого RTMP-сокета и игнорирует TERM → остаётся «осиротевший» процесс,
            # который держит имена потоков show и мешает следующей публикации.
            # KILL валит его гарантированно. Подстраховка — orphan_reaper.sh (cron).
            exec_kill_signal kill;
        }

        # === Выдача ABR-HLS (master + варианты) ===
        application show {
            live on;
            allow play all;
            # ПОРЯДОК ВАЖЕН: первое совпадение выигрывает. Сначала разрешаем
            # локальный ffmpeg, затем запрещаем всех остальных публиковать.
            allow publish 127.0.0.1;
            deny publish all;
            gop_cache on;

            # Окно 60 с → плеер может держать буфер до ~50 с.
            hls on;
            hls_path /var/www/balchug/hls;
            hls_fragment 2s;
            hls_playlist_length 60s;
            hls_continuous on;
            hls_cleanup on;
            hls_nested on;                # каждый вариант в своей папке

            # Master-плейлист /hls/<key>.m3u8 собирается по суффиксам:
            hls_variant _src BANDWIDTH=6500000,RESOLUTION=1920x1080;
            hls_variant _720 BANDWIDTH=3100000,RESOLUTION=1280x720;
            hls_variant _480 BANDWIDTH=1500000,RESOLUTION=854x480;
        }
    }
}

# -----------------------------------------------------------------------------
#  HTTP — веб-плеер, HTTP-FLV, HLS, статистика, ACME
# -----------------------------------------------------------------------------
http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ---- 80: ACME challenge + редирект на HTTPS ----
    server {
        listen 80;
        listen [::]:80;
        server_name balchug.racing www.balchug.racing;

        # Let's Encrypt webroot для выпуска/продления сертификата
        location /.well-known/acme-challenge/ {
            root /var/www/balchug;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- 443: основной сайт ----
    server {
        # ВАЖНО: без http2 — nginx-http-flv-module не поддерживает HTTP-FLV по HTTP/2.
        # FLV-воспроизведение требует HTTP/1.1.
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name balchug.racing www.balchug.racing;

        ssl_certificate     /etc/letsencrypt/live/balchug.racing/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/balchug.racing/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        root /var/www/balchug;
        index index.html;

        # Разделы SMP сняты с публикации. Явный 410 не даёт общему fallback
        # вернуть главную страницу с HTTP 200 по старым адресам.
        location = /smp-live {
            return 410;
        }
        location ^~ /smp-live/ {
            return 410;
        }
        location = /smp-races {
            return 410;
        }
        location ^~ /smp-races/ {
            return 410;
        }

        # --- HTML (плеер и страницы): НЕ кэшируем — всегда свежие.
        #     Так правки плеера/логики видны сразу; настройки живут в localStorage. ---
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache" always;
        }

        # --- Статика /assets: кэшируем, чтобы шрифты/CSS не перезапрашивались при
        #     переходах между страницами (это и вызывало мигание заголовков, FOUT).
        #     Шрифты неизменны → кэш на год (immutable); css/js/картинки — на час.
        #     Трансляции (/hls, /live) это не касается — у них свои локации. ---
        location ~* \.woff2$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            access_log off;
        }
        location /assets/ {
            expires 1h;
            access_log off;
        }

        # --- Lifecycle API live timing. A separate process owns engineer
        #     writes; it never shares the public archive process. ---
        location ^~ /api/timing/ {
            proxy_pass http://127.0.0.1:8091/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # --- API каталога записей (FastAPI/uvicorn) ---
        location /api/ {
            proxy_pass http://127.0.0.1:8090/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # --- HTTP-FLV (низкая задержка, flv.js) ---
        # URL для плеера: https://balchug.racing/live?app=live&stream=<KEY>
        location /live {
            flv_live on;
            chunked_transfer_encoding on;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Cache-Control' 'no-cache' always;
        }

        # --- HLS (fallback, hls.js / нативный Safari) ---
        # URL для плеера: https://balchug.racing/hls/<KEY>.m3u8
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /var/www/balchug;            # отдаёт /var/www/balchug/hls/...
            add_header 'Cache-Control' 'no-cache' always;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # --- Статистика RTMP (мониторинг потока) ---
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        location /stat.xsl {
            root /var/www/balchug;
        }
    }
}
