<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BALCHUG Racing — Радар осадков</title>
<meta name="theme-color" content="#1B365D" />
<link rel="icon" type="image/png" href="/assets/favicon.png" />
<link rel="preload" href="/assets/russoone-cyrillic.woff2" as="font" type="font/woff2" crossorigin />
<link rel="preload" href="/assets/russoone-latin.woff2" as="font" type="font/woff2" crossorigin />
<link rel="stylesheet" href="/assets/site.css" />
<style>
  .ctrl{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 10px;}
  .ctrl .lbl{font-family:var(--display);text-transform:uppercase;letter-spacing:.1em;font-size:11px;color:var(--muted);min-width:74px;}
  .tb-btn{font-family:var(--display);text-transform:uppercase;letter-spacing:.06em;font-size:11.5px;cursor:pointer;
    padding:8px 14px;border-radius:6px;border:1px solid var(--line);background:#fff;color:var(--navy);transition:.15s;}
  .tb-btn:hover{border-color:var(--navy);}
  .tb-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .note{margin-left:auto;font-family:var(--display);text-transform:uppercase;letter-spacing:.07em;font-size:10.5px;color:var(--muted);}
  .note.warn{color:var(--red);}
  @media (max-width:720px){ .note{margin-left:0;width:100%;} .ctrl .lbl{min-width:0;} }
</style>
</head>
<body>
  <header>
    <div class="wrap head-inner">
      <a class="brand" href="/">
        <img src="/assets/logo.svg" alt="BALCHUG Racing" />
        <span class="sep"></span>
        <span class="kicker">Onboard&nbsp;<b>//</b>&nbsp;Live</span>
      </a>
      <nav class="nav">
        <a href="/" class="live">Онборд</a>
        <a href="/telemetry/">Телеметрия трассы</a>
        <a href="/weather/" class="active">Радар осадков</a>
        <a href="/archive/">Архив</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div class="titlebar reveal">
        <h1>Радар осадков</h1>
        <span class="sub" id="sub">Осадки в районе трассы</span>
        <a class="src-link" id="extLink" href="#" target="_blank" rel="noopener">Открыть в новом окне ↗</a>
      </div>

      <div class="ctrl reveal">
        <span class="lbl">Трасса:</span>
        <button class="tb-btn" data-track="moscow">Moscow Raceway</button>
        <button class="tb-btn" data-track="igora">Igora Drive</button>
      </div>
      <div class="ctrl reveal">
        <span class="lbl">Источник:</span>
        <button class="tb-btn" data-src="windy">Windy</button>
        <button class="tb-btn" data-src="rainviewer">RainViewer</button>
        <button class="tb-btn" data-src="ventusky">Ventusky</button>
        <span class="note" id="note"></span>
      </div>

      <div class="embed-wrap reveal">
        <div class="embed-loader" id="ld"><div class="gauge"></div><p>Загрузка карты осадков…</p></div>
        <iframe id="map" title="Карта осадков"
                allow="fullscreen" referrerpolicy="no-referrer-when-downgrade"
                onload="document.getElementById('ld').classList.add('hidden')"></iframe>
      </div>
    </div>
  </main>

  <footer>
    <div class="wrap foot-inner">
      <a class="foot-logo" href="/" aria-label="BALCHUG Racing — главная"><img src="/assets/logo.svg" alt="BALCHUG Racing" /></a>
      <a class="boris-btn" href="/archive/#boris">Кнопка для Бориса</a>
      <a class="team-site" href="https://balchug-racing.ru/" target="_blank" rel="noopener">balchug-racing.ru ↗</a>
    </div>
  </footer>

  <script>
  (function(){
    "use strict";

    var TRACKS = {
      // def: источник по умолчанию (для обеих трасс — Ventusky «Радар погоды»).
      // rvRadar: есть ли у RainViewer радарное покрытие. Москва — нет (только спутник).
      moscow: { name:"Moscow Raceway", lat:55.9955, lon:36.2700, def:"ventusky", rvRadar:false },
      igora:  { name:"Igora Drive",    lat:60.5135, lon:30.1965, def:"ventusky", rvRadar:true }
    };

    var SOURCES = {
      // Windy — модельные осадки/прогноз, покрывает всё (в т.ч. Москву)
      windy: { name:"Windy", host:"windy.com",
        build:function(t){ return "https://embed.windy.com/embed2.html?lat="+t.lat+"&lon="+t.lon+
          "&detailLat="+t.lat+"&detailLon="+t.lon+"&zoom=8&level=surface&overlay=rain&product=ecmwf"+
          "&menu=&message=&marker=true&calendar=now&pressure=&type=map&location=coordinates&detail="+
          "&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1"; },
        ext:function(t){ return "https://www.windy.com/-Rain-thunder-rain?rain,"+t.lat+","+t.lon+",8"; } },
      // RainViewer — реальный радар, где есть покрытие (Игора). Где радара нет
      // (Москва) — переключаемся на применимый режим: спутник (облачность, глобальный).
      rainviewer: { name:"RainViewer", host:"rainviewer.com",
        build:function(t){ var layer=t.rvRadar?"radar":"satellite";
          return "https://www.rainviewer.com/map.html?loc="+t.lat+","+t.lon+
          ",8&oFa=0&oC=0&oU=0&oCS=1&oF=0&oP=0&c=3&o=83&lm=1&layer="+layer+"&sm=1&sn=1&hu=false"; },
        ext:function(t){ var layer=t.rvRadar?"radar":"satellite";
          return "https://www.rainviewer.com/map.html?loc="+t.lat+","+t.lon+",8&layer="+layer; } },
      // Ventusky — режим «Радар погоды» (l=radar): nowcast-радар осадков, покрывает всё
      ventusky: { name:"Ventusky", host:"ventusky.com",
        build:function(t){ return "https://embed.ventusky.com/?p="+t.lat+";"+t.lon+";9&l=radar"; },
        ext:function(t){ return "https://www.ventusky.com/?p="+t.lat+";"+t.lon+";9&l=radar"; } }
    };

    var map=document.getElementById("map"), ld=document.getElementById("ld"),
        sub=document.getElementById("sub"), note=document.getElementById("note"),
        extLink=document.getElementById("extLink"),
        trackBtns=document.querySelectorAll("[data-track]"),
        srcBtns=document.querySelectorAll("[data-src]");

    var curTrack="moscow", curSrc="windy";

    function setActive(list, attr, val){
      for(var i=0;i<list.length;i++) list[i].classList.toggle("active", list[i].getAttribute(attr)===val);
    }
    function persist(){ try{ localStorage.setItem("balchug_track",curTrack); localStorage.setItem("balchug_src",curSrc);
      history.replaceState(null,"","?track="+curTrack+"&src="+curSrc); }catch(e){} }

    function render(){
      var t=TRACKS[curTrack], s=SOURCES[curSrc];
      ld.classList.remove("hidden");
      map.src=s.build(t);
      sub.textContent=t.name+" · осадки";
      extLink.href=s.ext(t);
      setActive(trackBtns,"data-track",curTrack);
      setActive(srcBtns,"data-src",curSrc);
      // подсказка по покрытию
      if(curSrc==="rainviewer" && !TRACKS[curTrack].rvRadar){
        note.textContent="RainViewer: радара над Москвой нет — показан спутник (облачность)";
        note.className="note warn";
      } else if(curSrc==="rainviewer"){
        note.textContent="RainViewer · реальный радар осадков";
        note.className="note";
      } else {
        note.textContent="модельные осадки/прогноз · покрывает Москву";
        note.className="note";
      }
      persist();
    }

    for(var i=0;i<trackBtns.length;i++) trackBtns[i].addEventListener("click", function(){
      curTrack=this.getAttribute("data-track"); curSrc=TRACKS[curTrack].def; render();  // трасса → её источник по умолчанию
    });
    for(var j=0;j<srcBtns.length;j++) srcBtns[j].addEventListener("click", function(){
      curSrc=this.getAttribute("data-src"); render();
    });

    // начальное состояние: из ?query, иначе localStorage, иначе дефолты
    var qs=new URLSearchParams(location.search);
    var qt=qs.get("track"), qsr=qs.get("src");
    try{ qt=qt||localStorage.getItem("balchug_track"); qsr=qsr||localStorage.getItem("balchug_src"); }catch(e){}
    if(TRACKS[qt]) curTrack=qt;
    curSrc = SOURCES[qsr] ? qsr : TRACKS[curTrack].def;
    render();
  })();
  </script>
</body>
</html>
