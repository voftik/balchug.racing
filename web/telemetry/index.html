<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BALCHUG Racing — Телеметрия трассы</title>
<meta name="theme-color" content="#1B365D" />
<link rel="icon" type="image/png" href="/assets/favicon.png" />
<link rel="preload" href="/assets/russoone-cyrillic.woff2" as="font" type="font/woff2" crossorigin />
<link rel="preload" href="/assets/russoone-latin.woff2" as="font" type="font/woff2" crossorigin />
<link rel="stylesheet" href="/assets/site.css" />
<style>
  .ctrl{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 10px;}
  .ctrl .lbl{font-family:var(--display);text-transform:uppercase;letter-spacing:.1em;font-size:11px;color:var(--muted);min-width:74px;}
  .tb-btn{font-family:var(--display);text-transform:uppercase;letter-spacing:.06em;font-size:11.5px;cursor:pointer;
    padding:8px 14px;border-radius:6px;border:1px solid var(--line);background:#fff;color:var(--navy);transition:.15s;}
  .tb-btn:hover{border-color:var(--navy);}
  .tb-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .note{margin-left:auto;font-family:var(--display);text-transform:uppercase;letter-spacing:.07em;font-size:10.5px;color:var(--muted);}
  @media (max-width:720px){ .note{margin-left:0;width:100%;} .ctrl .lbl{min-width:0;} }
</style>
</head>
<body>
  <header>
    <div class="wrap head-inner">
      <a class="brand" href="/">
        <img src="/assets/logo.svg" alt="BALCHUG Racing" />
        <span class="sep"></span>
        <span class="kicker">Onboard&nbsp;<b>//</b>&nbsp;Live</span>
      </a>
      <nav class="nav">
        <a href="/" class="live">Онборд</a>
        <a href="/telemetry/" class="active">Телеметрия трассы</a>
        <a href="/weather/">Радар осадков</a>
        <a href="/archive/">Архив</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div class="titlebar reveal">
        <h1>Телеметрия трассы</h1>
        <span class="sub" id="sub">live timing</span>
        <a class="src-link" id="extLink" href="#" target="_blank" rel="noopener">Открыть в новом окне ↗</a>
      </div>

      <div class="ctrl reveal">
        <span class="lbl">Трасса:</span>
        <button class="tb-btn" type="button" data-track="igora">Igora Drive</button>
        <button class="tb-btn" type="button" data-track="moscow">Moscow Raceway</button>
        <span class="note">хронометраж активен во время заездов на трассе</span>
      </div>

      <div class="embed-wrap reveal">
        <div class="embed-loader" id="ld"><div class="gauge"></div><p>Загрузка телеметрии…</p></div>
        <iframe id="lt" src="https://livetiming.getraceresults.com/igora" title="Live timing"
                allow="fullscreen" referrerpolicy="no-referrer-when-downgrade"
                onload="document.getElementById('ld').classList.add('hidden')"></iframe>
      </div>
    </div>
  </main>

  <footer>
    <div class="wrap foot-inner">
      <span class="fbrand">BALCHUG <b>RACING</b></span>
      <nav class="fnav">
        <a href="/">Онборд</a>
        <a href="/telemetry/">Телеметрия трассы</a>
        <a href="/weather/">Радар осадков</a>
        <a href="/archive/">Архив</a>
        <a href="https://solo.liveu.tv/" target="_blank" rel="noopener">Кабинет LiveU ↗</a>
      </nav>
      <span class="fmeta">Источник: <a id="fsrc" href="#" target="_blank" rel="noopener">getraceresults.com</a></span>
    </div>
  </footer>

  <script>
  (function(){
    "use strict";

    // Live timing панели getraceresults (Time Service) по трассам.
    // Слаги проверены: /igora — основная трасса Игора Драйв («LiveTiming Igora»),
    // /moscowraceway — Moscow Raceway. Картинг Игоры (/igora-karting) не используется.
    var TRACKS = {
      igora:  { name:"Igora Drive",    url:"https://livetiming.getraceresults.com/igora" },
      moscow: { name:"Moscow Raceway", url:"https://livetiming.getraceresults.com/moscowraceway" }
    };
    var DEFAULT_TRACK = "igora";

    var lt=document.getElementById("lt"), ld=document.getElementById("ld"),
        sub=document.getElementById("sub"), extLink=document.getElementById("extLink"),
        fsrc=document.getElementById("fsrc"),
        btns=document.querySelectorAll("[data-track]");

    var cur=DEFAULT_TRACK;

    function render(){
      var t=TRACKS[cur];
      ld.classList.remove("hidden");
      lt.src=t.url;
      sub.textContent=t.name+" · live timing";
      extLink.href=t.url; fsrc.href=t.url;
      document.title="BALCHUG Racing — Телеметрия трассы ("+t.name+")";
      for(var i=0;i<btns.length;i++){
        var active=btns[i].getAttribute("data-track")===cur;
        btns[i].classList.toggle("active",active);
        btns[i].setAttribute("aria-pressed",String(active));
      }
      try{ localStorage.setItem("balchug_tt_track",cur);
        var next=new URL(location.href);
        next.searchParams.set("track",cur);
        history.replaceState(null,"",next.pathname+next.search+next.hash); }catch(e){}
    }

    for(var i=0;i<btns.length;i++) btns[i].addEventListener("click", function(){
      cur=this.getAttribute("data-track"); render();
    });

    // начальное состояние: ?track= → localStorage → дефолт (Игора)
    var qt=new URLSearchParams(location.search).get("track");
    try{ qt=qt||localStorage.getItem("balchug_tt_track"); }catch(e){}
    if(TRACKS[qt]) cur=qt;
    render();
  })();
  </script>
</body>
</html>
